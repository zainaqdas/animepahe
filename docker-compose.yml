version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: animepahe-web-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount the anime_downloader library from sibling directory
      - ../animepahe-dl:/app/animepahe-dl:ro
      - backend_cache:/root/.config/anime_downloader
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: animepahe-web-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_cache:
    driver: local
